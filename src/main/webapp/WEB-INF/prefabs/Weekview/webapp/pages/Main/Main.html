<wm-prefab-container name="prefab_container1">

<wm-button name="btnPrevious5Week" caption="-5" class="btn-transparent btn-sm btn-button-small" on-click="navigateToWeekOffset(-5)" variant="button-small"></wm-button>

<!-- Existing Single Previous Button -->
<wm-container direction="row" alignment="middle-left" gap="4" width="fill" name="container40" class="app-container-default align-items-baseline" variant="default" padding="unset unset 2px unset">
<wm-button name="btnPreviousWeek" caption="" iconclass="" class="btn-transparent p-0" on-click="previousWeek()" variant="transparent" iconurl="resources/images/imagelists/icon___fa-caret-left.png" iconwidth="24px"></wm-button>
<wm-container name="weekLabelContainer" class="app-container-default" direction="row" gap="4" alignment="middle-center" width="hug" height="hug" variant="default" on-click="weekLabelContainerClick($event, widget)">
<wm-label name="lblWeekRange" caption="bind:Variables.currentWeekVar.dataSet.weekLabel" class="label-label-14-700" variant="week-label"></wm-label>
<wm-picture resizemode="cover" name="picture3" class="img-rounded top-4" variant="default:rounded" picturesource="resources/images/imagelists/icon___fa-calendar-check-o.png" width="20px"></wm-picture>
<wm-picture resizemode="cover" class="img-rounded top-4" variant="default:rounded" name="picture4" picturesource="./resources/images/imagelists/icon__fa-calendar.png" width="20px"></wm-picture></wm-container>
<wm-calendar name="weekPickerCalendar" show="false" selectionmode="single" view="month" controls="navigation" class="week-picker-calendar" on-select="weekPickerCalendarSelect($start, $end, $view, $data)" width="50%"></wm-calendar>
<wm-button name="btnNextWeek" caption="" iconclass="" class="btn-transparent p-0" on-click="nextWeek()" variant="transparent" iconurl="resources/images/imagelists/icon___fa-caret-right.png" iconwidth="24px"></wm-button></wm-container>
