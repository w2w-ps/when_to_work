<wm-partial name="monthlyView">
    <wm-container name="monthNavBar" class="app-container-default month-nav-bar" direction="row" gap="auto"
        alignment="center" width="fill" height="hug" overflow="visible">
        <wm-container name="leftMonthsContainer" class="app-container-default left-months-container" direction="row"
            gap="4" alignment="middle-left" width="40%" height="hug" clipcontent="false" overflow="none">
            <wm-label name="lblFebruary" caption="February" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)"></wm-label>
            <wm-label name="lblMarch" caption="March" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)"></wm-label>
            <wm-label name="lblApril" caption="April" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)"></wm-label>
            <wm-label name="lblMay" caption="May" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)"></wm-label>
        </wm-container>
        <wm-container name="centerNavWrapper" class="app-container-default center-nav-wrapper" direction="row"
            gap="auto" alignment="center" width="20%" height="hug"
            on-mouseenter="centerNavWrapperMouseenter($event, widget)"
            on-mouseleave="centerNavWrapperMouseleave($event, widget)" overflow="visible">
            <wm-container name="centerNavContainer" class="app-container-default" direction="row" gap="auto"
                alignment="center" width="fill" height="hug" clipcontent="false" overflow="none">
                <wm-anchor name="iconPrevMonth" iconclass="wi wi-chevron-left" caption="" class="nav-chevron-btn"
                    on-tap="iconPrevMonthTap($event, widget)"></wm-anchor>
                <wm-label name="lblCurrentMonth" caption="Month Year" fontweight="bold" class="current-month-label">
                </wm-label>
                <wm-icon name="iconCalendar" iconclass="fa fa-calendar" iconsize="1.1em"></wm-icon>
                <wm-anchor name="iconNextMonth" iconclass="wi wi-chevron-right" caption="" class="nav-chevron-btn"
                    on-tap="iconNextMonthTap($event, widget)"></wm-anchor>
            </wm-container>
            <wm-container name="calendarDropdown" class="app-container-default calendar-dropdown-popup"
                show="bind:Variables.isCalendarVisible.dataSet" direction="column" gap="4" alignment="top-left"
                width="320px" height="auto" overflow="visible" padding="unset 10px" clipcontent="false">
                <wm-calendar name="calendarPopup" width="300px" controls="navigation"
                    on-dateclick="calendarPopupDateclick($dateInfo)" calendartype="basic"></wm-calendar>
            </wm-container>
        </wm-container>
        <wm-container name="rightMonthsContainer" class="app-container-default right-months-container" direction="row"
            gap="4" alignment="middle-left" width="40%" height="hug" clipcontent="false" overflow="none">
            <wm-label name="lblJuly" caption="July" class=" month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)" variant="highlighted-white-14-400"></wm-label>
            <wm-label name="lblAugust" caption="August" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)" variant="highlighted-white-14-400"></wm-label>
            <wm-label name="lblSeptember" caption="September" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)" variant="highlighted-white-14-400"></wm-label>
            <wm-label name="lblOctober" caption="October" class="month-label label-highlighted-white-14-400"
                on-tap="monthLabelTap($event, widget)" variant="highlighted-white-14-400"></wm-label>
        </wm-container>
    </wm-container>
</wm-partial>
