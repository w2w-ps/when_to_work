<wm-page name="page" pagetitle="Employee View">

                    <wm-label name="lblScheduleTitle" caption="Published Schedule" class="label-label-bold-20"
                        variant="label-bold-20"></wm-label>
                </wm-container>

                    alignment="middle-left" width="fill" height="hug" padding="5px unset 15px unset">
                    <wm-container name="toolbarLeftGroup" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="hug" height="hug"></wm-container>
                    <wm-container name="toolbarRightGroup" class="app-container-default" direction="row" gap="8"

                            dataset="Calendar View,By Position View,By Employee View,Chart View,Sortable List View,Multi-Shift Edit View,Graphical View,Availability View,Statistics View,Grid View,Recently Deleted Shifts,Template Editor"
                            placeholder="By Employee View" variant="compact-input" datafield="All Fields"
                            class="form-compact-input"></wm-select>
                    </wm-container>
                    <wm-container direction="row" alignment="top-right" gap="10" width="fill"
                        class="app-container-default" variant="default" name="container59"
                        padding="unset 16px unset unset">
                        <wm-select name="selStatus"
                            dataset="No Status, Full Time, Part Time, Per Diem, Orange Diamond, Green Diamond"
                            placeholder="All Status" variant="compact-input" datafield="All Fields"
                            class="form-compact-input"></wm-select>
                        <wm-select name="selCategories"
                            dataset="All Categories, Add/Edit Categories, ----------, Select / Group Categories, none, Night &amp; WE, ----------, East, Less Popular Shifts (LP),Morning (AM), Night Shifts (NIGHT),Sick - Called In (SICK), Tardy,Weekend Shifts (WE), West"

                        show="true" padding="5px unset" clipcontent="false">
                        <wm-button class="btn-actions-btn btn-outlined-primary" caption="Cancel" type="button"
                            margin="unset" name="Cancel" variant="outlined-primary"
                            on-click="Widgets.shiftDialog.close()"></wm-button>
                        <wm-anchor margin="unset 0.5em" name="anchor2" variant="standard-sm-Arial"
                            iconclass="bind:isAdd ? &quot;fa fa-list-alt&quot; : &quot;fa fa-users&quot;"
                            caption="bind:isAdd ? &quot;Assign to existing open shift&quot; : &quot;Available Employees&quot;"
                            class="anchor-standard-sm-Arial"></wm-anchor>
                        <wm-button class="btn-actions-btn btn-outlined-primary"
                            caption="bind:isAdd ? &quot;Add Shift&quot; : &quot;Save&quot;" type="button" margin="unset"
                            name="button16" variant="outlined-primary" on-click="button16Click($event, widget)">
                        </wm-button>
                    </wm-container>
                </wm-form>
            </wm-dialog>
        </wm-page-content>
    </wm-content>
    <wm-dialog name="confirmShiftChangeDialog" title="Confirm" modal="true" closable="false" showheader="true"
        class="modal-confirm-dialog" variant="confirm-dialog">
        <wm-container name="confirmDialog1Body" class="app-container-default" direction="column" gap="16"
            alignment="middle-center" width="fill" height="hug" padding="16px 24px">
            <wm-label name="lblConfirmShiftMsg"
                caption="Do you want to change this shift? (Notices will NOT be sent to affected employees.)"
                class="text-center label-label-14-400" width="fill" variant="label-14-400"></wm-label>
            <wm-container name="confirmDialog1Actions" class="app-container-default" direction="row" gap="24"
                alignment="middle-center" width="fill" height="hug">
                <wm-button name="btnConfirmShiftYes" caption="Yes" class="btn-success-btn" variant="success-btn"
                    on-click="btnConfirmShiftYesClick($event, widget)"></wm-button>
                <wm-button name="btnConfirmShiftNo" caption="No" class="btn-danger-btn" variant="danger-btn"
                    on-click="btnConfirmShiftNoClick($event, widget)"></wm-button>
            </wm-container>
        </wm-container>
    </wm-dialog>
    <wm-dialog name="confirmConflictDialog" title="Confirm" modal="true" closable="false" showheader="true"
        class="modal-confirm-dialog" variant="confirm-dialog">
        <wm-container name="confirmDialog2Body" class="app-container-default" direction="column" gap="12"
            alignment="middle-center" width="fill" height="hug" padding="16px 24px">
            <wm-label name="lblConflictWarningStatic"
                caption="WARNING: There is a conflict with the shift you are trying to change:"
                class="app-label confirm-dialog-warning text-center" width="fill"></wm-label>
            <wm-label name="lblConflictWarningDynamic" caption="bind:Variables.conflictMessageVar.dataSet.message"
                class="confirm-dialog-conflict-name text-center label-label-14-700" width="fill" variant="label-14-700">
            </wm-label>
            <wm-label name="lblConflictQuestion" caption="Would you like to change the shift anyway?"
                class="confirm-dialog-sub-msg text-center label-label-14-400" width="fill" variant="label-14-400">
            </wm-label>
            <wm-container name="confirmDialog2Actions" class="app-container-default" direction="row" gap="24"
                alignment="middle-center" width="fill" height="hug">
                <wm-button name="btnConflictYes" caption="Yes" class="btn-success-btn" variant="success-btn"
                    on-click="btnConflictYesClick($event, widget)"></wm-button>
                <wm-button name="btnConflictNo" caption="No" class="btn-danger-btn" variant="danger-btn"
                    on-click="btnConflictNoClick($event, widget)"></wm-button>
            </wm-container>
        </wm-container>
    </wm-dialog>
</wm-page>
