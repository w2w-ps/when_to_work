<wm-page name="page" pagetitle="Mgrchangeemppass">
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent">
            <wm-container name="pageWrapper" class="app-container-default popout-container-wrapper" direction="column"
                gap="16" alignment="top-center" width="fill" height="hug">
                <!-- Page Title Area -->
                <wm-container name="titleContainer" class="app-container-default" direction="column" gap="4"
                    alignment="top-center" width="fill" height="hug">
                    <wm-label name="pageTitle" caption="Change username/password" class="label-label-18-700"
                        variant="label-18-700"></wm-label>
                    <wm-label name="employeeNameTitle" caption="bind:Variables.employeeData.dataSet.username"
                        class="label-label-18-700" variant="label-18-700"></wm-label>
                </wm-container>
                <!-- Current Section -->
                <wm-container direction="column" alignment="top-left" gap="4" width="fill" name="container14"
                    class="container-grey-standard" variant="grey-standard" wrap="false">
                    <wm-container name="currentSection" class="container-grey-container" direction="column" gap="8"
                        alignment="top-left" width="fill" height="hug" variant="grey-container">
                        <wm-label name="currentHeading" caption="Current" class="label-label-20-700"
                            variant="label-20-700"></wm-label>
                        <wm-container name="currentUsernameRow" class="app-container-default" direction="row" gap="30"
                            alignment="middle-left" width="fill" height="hug">
                            <wm-label name="currentUsernameLabel" caption="Username:" variant="label-14-400"
                                class="label-label-14-400 pull-right" width="40%"></wm-label>
                            <wm-label name="currentUsernameValue" caption="bind:Variables.employeeData.dataSet.username"
                                variant="label-14-400" class="label-label-14-400"></wm-label>
                        </wm-container>
                    </wm-container>
                    <wm-container name="newSection" class="container-grey-container" direction="column" gap="8"
                        alignment="top-left" width="fill" height="hug" variant="grey-container">
                        <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container14_1"
                            class="app-container-default white-divider" variant="default"></wm-container>
                        <wm-label name="newHeading" caption="New" class="label-label-20-700" variant="label-20-700">
                        </wm-label>
                        <wm-container name="newDivider" class="app-container-default" direction="row" gap="0"
                            alignment="middle-left" width="fill" height="1px"></wm-container>
                        <!-- Username Field -->
                        <wm-container name="newUsernameRow" class="app-container-default" direction="row" gap="8"
                            alignment="middle-right" width="fill" height="hug">
                            <wm-label name="newUsernameLabel" caption="Username" variant="label-14-400" width="40%"
                                class="label-label-14-400 pull-right"></wm-label>
                            <wm-text name="newUsernameInput" datavalue="bind:Variables.employeeData.dataSet.newUsername"
                                class="form-control app-textbox form-popout-control" variant="popout-control"
                                required="true"></wm-text>
                        </wm-container>
                        <!-- Password Field -->
                        <wm-container name="newPasswordRow" class="app-container-default" direction="row" gap="8"
                            alignment="middle-right" width="fill" height="hug">
                            <wm-label name="newPasswordLabel" caption="Password" variant="label-14-400" width="40%"
                                class="label-label-14-400 pull-right"></wm-label>
                            <wm-text name="newPasswordInput" type="password"
                                datavalue="bind:Variables.employeeData.dataSet.password"
                                class="form-control app-textbox form-popout-control" variant="popout-control"
                                required="true" on-change="checkPasswordStrength($event, widget, newVal, oldVal)">
                            </wm-text>
                        </wm-container>
                        <!-- Password Strength -->
                        <wm-container name="passwordStrengthRow" direction="column" gap="4" alignment="top-left"
                            width="fill" height="hug" variant="grey-standard">
                            <wm-label name="passwordStrengthLabel" caption="Password Strength"
                                variant="label-12-400-grey" class="label-label-12-400-grey label-label-12-400-grey">
                            </wm-label>
                            <wm-progress-bar name="passwordStrengthBar" datavalue="0" minvalue="0" maxvalue="100"
                                type="danger" width="100%" class="progress-bar-password-danger"
                                variant="password-danger" show="true"></wm-progress-bar>
                        </wm-container>
                        <!-- Confirm Password Field -->
                        <wm-container name="confirmPasswordRow" class="app-container-default" direction="row" gap="8"
                            alignment="middle-right" width="fill" height="hug">
                            <wm-label name="confirmPasswordLabel" caption="Confirm Password" variant="label-14-400"
                                width="40%" class="pull-right label-label-14-400"></wm-label>
                            <wm-text name="confirmPasswordInput" type="password"
                                datavalue="bind:Variables.employeeData.dataSet.confirmPassword" required="true"
                                class="form-control app-textbox form-popout-control" variant="popout-control"></wm-text>
                        </wm-container>
                    </wm-container>
                </wm-container>
                <!-- New Section -->
                <!-- Save Button -->
                <wm-container name="saveButtonContainer" class="app-container-default" direction="row" gap="8"
                    alignment="middle-center" width="fill" height="hug">
                    <wm-button name="saveBtn" caption="Save" class="btn-outlined-primary" variant="outlined-primary"
                        on-click="saveBtnClick($event, widget)"></wm-button>
                </wm-container>
                <!-- Information Section -->
                <wm-container name="infoSection" class="container-grey-container container-grey-standard"
                    direction="column" gap="12" alignment="top-left" width="fill" height="hug" variant="grey-standard">
                    <wm-label name="infoHeading" caption="Information" class="label-label-20-700"
                        variant="label-20-700"></wm-label>
                    <wm-label name="infoText1"
                        caption="- You are creating a temporary username and password for this individual, and when they sign in using it they will be prompted to update this information for future access."
                        variant="label-14-400" class="label-label-14-400"></wm-label>
                    <wm-label name="infoText2"
                        caption="- Saving this new information will expire all previous open sessions (like their bookmarked pages and mobile app icons)."
                        variant="label-14-400" class="label-label-14-400"></wm-label>
                    <wm-label name="infoText3"
                        caption="-  A strong password should contain a mix of capital and lower-case letters, numbers and symbols, and not be used to access any other system."
                        variant="label-14-400" class="label-label-14-400"></wm-label>
                </wm-container>
            </wm-container>
        </wm-page-content>
    </wm-content>
    <wm-alertdialog on-ok="Widgets.confirmpwd.close()" name="confirmpwd" class="modal-confirm-dialog"
        variant="confirm-dialog" iconclass="" title="" alerttype="warning"
        message="Please type the password exactly the same in both boxes"></wm-alertdialog>
    <wm-alertdialog on-ok="Widgets.pwdLength.close()" name="pwdLength" class="modal-success-dialog"
        variant="success-dialog" title="" iconclass="" message="Please select a password of at least 8 characters.">
    </wm-alertdialog>
</wm-page>
