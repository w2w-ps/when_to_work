<wm-page name="page" pagetitle="Test Drive">
<wm-header content="header" name="header"></wm-header>
<wm-content name="content">
<wm-page-content name="pagecontent">
<!-- Section 1: Hero/Title Strip -->
<wm-container name="heroSection" class="app-container-default hero-section" direction="column" gap="8" alignment="top-center" width="fill" height="hug">
<wm-label name="heroTitle" caption="Test Drive" class="app-label h1 text-center"></wm-label>
<wm-label name="heroSubtitle" caption="Check out a Sample Company" class="app-label p text-center text-muted"></wm-label></wm-container>
<!-- Section 2: Main Content (2-column) -->
<wm-container name="mainContentSection" class="app-container-default main-content-section" direction="column" gap="24" alignment="top-center" width="fill" height="hug">
<wm-label name="mainHeading" caption="Want to quickly check out W2W without adding your own scheduling data?" class="app-label h2 text-center main-heading-label"></wm-label>
<wm-container name="mainContentRow" class="app-container-default" direction="row" gap="32" alignment="top-center" width="hug" height="hug">
<!-- Left Column: Text -->
<wm-container name="contentLeft" class="app-container-default" direction="column" gap="12" alignment="top-left" width="400px" height="hug">
<wm-label name="testDriveTitle" caption="Try a &quot;Test Drive.&quot;" class="app-label h5"></wm-label>
<wm-label name="testDriveDesc" caption="Click to sign into a sample account as a manager or employee and explore in &quot;read only&quot; mode a sample company set up in our employee scheduling system." class="app-label p"></wm-label></wm-container>
<!-- Right Column: Buttons -->
<wm-container name="contentRight" class="app-container-default" direction="column" gap="12" alignment="top-center" width="220px" height="hug">
<wm-button name="btnViewManager" caption="View as MANAGER" class="btn-filled btn-primary btn-navy-filled"></wm-button>
<wm-button name="btnViewEmployee" caption="View as EMPLOYEE" class="btn-filled btn-primary btn-navy-filled"></wm-button></wm-container></wm-container></wm-container>
<!-- Section 3: Free Trial Note -->
<wm-container name="freeTrialSection" class="app-container-default free-trial-section" direction="column" gap="4" alignment="top-center" width="fill" height="hug">
<wm-label name="freeTrialNote" caption="At any time you can request your own free trial and set up your organization and use WhenToWork online employee scheduling for 30 days free." class="app-label p text-center"></wm-label></wm-container>
<!-- Section 4: CTA Banner -->
<wm-container name="ctaBanner" class="app-container-default cta-banner-section" direction="column" gap="16" alignment="top-center" width="fill" height="hug">
<wm-label name="ctaHeading" caption="Make Scheduling the Easiest Part of Your Day" class="app-label h2 text-center label-on-dark"></wm-label>
<wm-label name="ctaSubtitle" caption="Start your 30-day free trial and see how simple scheduling can be for you and your team." class="app-label p text-center label-on-dark"></wm-label>
<wm-button name="btnStartScheduling" caption="Start Scheduling Now" class="btn-outlined btn-default btn-cta-white-outlined"></wm-button>
<wm-label name="ctaNote" caption="No Credit Card or Phone Number Required" class="app-label p text-center label-cta-note"></wm-label></wm-container></wm-page-content></wm-content>
<wm-footer content="footer_Copy" name="footer"></wm-footer></wm-page>
