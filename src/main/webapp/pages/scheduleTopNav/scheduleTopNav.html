<wm-partial name="partial1">
    <wm-container name="scheduleHeaderSection" class="app-container-default" direction="column" gap="0"
        alignment="top-left" width="fill" height="hug">
        <!-- Row 1: Title Block -->
        <wm-container name="titleRow" class="app-container-default" direction="column" gap="10" alignment="top-center"
            width="fill" height="hug" padding="15px unset">
            <wm-label name="lblCompanyName" caption="Sample Company" class="label-label-bold-20"
                variant="label-bold-20"></wm-label>
            <wm-label name="lblScheduleTitle" caption="Published Schedule" class="label-label-bold-20"
                variant="label-bold-20"></wm-label>
        </wm-container>
        <!-- Row 2: Toolbar Row -->
        <wm-container name="toolbarRow" class="app-container-default" direction="row" gap="auto" alignment="middle-left"
            width="fill" height="hug" padding="5px unset 15px unset">
            <wm-container name="toolbarLeftGroup" class="app-container-default" direction="row" gap="8"
                alignment="middle-left" width="hug" height="hug"></wm-container>
            <wm-container name="toolbarRightGroup" class="app-container-default" direction="row" gap="8"
                alignment="middle-right" width="hug" height="hug"></wm-container>
            <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container58"
                class="app-container-default" variant="default" padding="unset unset unset 16px">
                <wm-select name="selViewType"
                    dataset="Calendar View,By Position View,By Employee View,Chart View,Sortable List View,Multi-Shift Edit View,Graphical View,Availability View,Statistics View,Grid View,Recently Deleted Shifts,Template Editor"
                    placeholder="By Employee View" variant="compact-input" datafield="All Fields"
                    class="form-compact-input" on-change="selViewTypeChange($event, widget, newVal, oldVal)">
                </wm-select>
            </wm-container>
            <wm-container direction="row" alignment="top-right" gap="10" width="fill" class="app-container-default"
                variant="default" name="container59" padding="unset 16px unset unset">
                <wm-select name="selStatus"
                    dataset="No Status, Full Time, Part Time, Per Diem, Orange Diamond, Green Diamond"
                    placeholder="All Status" variant="compact-input" datafield="All Fields" class="form-compact-input"
                    on-change="selStatusChange($event, widget, newVal, oldVal)"></wm-select>
                <wm-select name="selCategories" placeholder="All Categories" variant="compact-input"
                    datafield="All Fields" class="form-compact-input"
                    on-change="selCategoriesChange($event, widget, newVal, oldVal)"
                    dataset="bind:Variables.mvCombinedCategories.dataSet" displayfield="displayLabel"></wm-select>
                <wm-select name="selPositions" placeholder="All Positions" variant="compact-input"
                    datafield="All Fields" class="form-compact-input"
                    on-change="selPositionsChange($event, widget, newVal, oldVal)"
                    dataset="bind:Variables.mvCombinedPositions.dataSet" displayfield="displayLabel"></wm-select>
            </wm-container>
        </wm-container>
        <!-- Row 3: Action Button Bar -->
        <wm-container name="actionButtonBar" class="app-container-default schedule-action-bar" direction="row" gap="0"
            alignment="middle-center" width="fill" height="30" clipcontent="false" padding="6px unset">
            <wm-button name="btnAddShifts" caption="Add Shifts"
                class="btn-default schedule-bar-btn btn-filled btn-primary btn-emp-shift1" variant="filled:primary">
            </wm-button>
            <wm-button name="btnSearch" caption="Search"
                class=" btn-emp-shift2 btn-default schedule-bar-btn btn-filled btn-primary " variant="filled:primary">
            </wm-button>
            <wm-button name="btnSaveTemplate" caption="Save Template"
                class=" btn-emp-shift3 btn-default schedule-bar-btn btn-filled btn-primary" variant="filled:primary">
            </wm-button>
            <wm-button name="btnPrint" caption="Print"
                class=" btn-emp-shift4 btn-default schedule-bar-btn btn-filled btn-primary" variant="filled:primary">
            </wm-button>
            <wm-button name="btnUnPublish" caption="UnPublish"
                class=" btn-emp-shift5 btn-default schedule-bar-btn btn-filled btn-primary" variant="filled:primary">
            </wm-button>
            <wm-button name="btnExport" caption="Export"
                class=" btn-emp-shift6 btn-default schedule-bar-btn btn-filled btn-primary" variant="filled:primary">
            </wm-button>
        </wm-container>
    </wm-container>
</wm-partial>
