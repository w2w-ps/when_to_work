<wm-page name="page" pagetitle="Mgrempinfopop">
    <wm-header content="header" name="header1"></wm-header>
    <wm-top-nav content="topnav" name="top_nav1"></wm-top-nav>
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent">
            <wm-container name="empinfo_root" class="app-container-default" direction="column" gap="8"
                alignment="top-left" width="fill" height="hug" padding="8px">
                <!-- Employee Name Header -->
                <wm-container name="emp_name_header" class="app-container-default" direction="row" gap="0"
                    alignment="middle-center" width="fill" height="hug" padding="8px 0px">
                    <wm-label name="lbl_emp_name"
                        caption="bind:(Variables.svGetEmployeeById.dataSet.firstName || '') + ' ' + (Variables.svGetEmployeeById.dataSet.lastName || '')"
                        class="text-center label-20-700" variant="label-20-700"></wm-label>
                </wm-container>
                <!-- Tabs -->
                <wm-tabs name="emp_tabs" defaultpaneindex="0">
                    <!-- TAB 1: Info -->
                    <wm-tabpane name="tab_info" title="Info">
                        <!-- Details Section -->
                        <wm-container name="details_section"
                            class="grey-no-radius-small-container container-grey-no-radius-small-container"
                            direction="column" gap="0" alignment="top-left" width="fill" height="hug" padding="16px">
                            <!-- Details Header -->
                            <wm-label name="lbl_details_heading" caption="Details" variant="label-18-700"
                                class="label-18-700"></wm-label>
                            <!-- Row: Name -->
                            <wm-container name="row_name" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_name_field" caption="Name" class="text-right label-14-400"
                                    width="140px" variant="label-14-400"></wm-label>
                                <wm-icon name="icon_name_person" iconclass="wm-sl-l sl-user" iconsize="18px"></wm-icon>
                                <wm-label name="lbl_name_value"
                                    caption="bind:(Variables.svGetEmployeeById.dataSet.firstName || '') + ' ' + (Variables.svGetEmployeeById.dataSet.lastName || '')"
                                    variant="label-bold" class="label-bold"></wm-label>
                            </wm-container>
                            <!-- Divider -->
                            <wm-container name="divider1" class="app-container-default" direction="row" gap="0"
                                alignment="top-left" width="fill" height="1px" backgroundcolor="#cccccc"></wm-container>
                            <!-- Row: Emails/Texts -->
                            <wm-container name="row_email" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_email_field" caption="Emails/Texts" class="text-right label-14-400"
                                    width="140px" variant="label-14-400"></wm-label>
                                <wm-icon name="icon_email_person" iconclass="wm-sl-l sl-user" iconsize="18px"></wm-icon>
                                <wm-container name="email_value_col" class="app-container-default" direction="column"
                                    gap="2" alignment="top-left" width="fill" height="hug">
                                    <wm-label name="lbl_email_value"
                                        caption="bind:Variables.svGetEmployeeById.dataSet.email || 'No emails entered'"
                                        variant="label-16-400-Arial-Italic" class="label-16-400-Arial-Italic">
                                    </wm-label>
                                    <wm-anchor name="anc_edit_emails" caption="Add / Edit Emails &amp; Notifications"
                                        iconclass="wi wi-edit" iconposition="left"></wm-anchor>
                                </wm-container>
                            </wm-container>
                            <!-- Divider -->
                            <wm-container name="divider2" class="app-container-default" direction="row" gap="0"
                                alignment="top-left" width="fill" height="1px" backgroundcolor="#cccccc"></wm-container>
                            <!-- Row: Phone -->
                            <wm-container name="row_phone" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_phone_field" caption="Phone" class="text-right label-14-400"
                                    width="140px" variant="label-14-400"></wm-label>
                                <wm-icon name="icon_phone_person" iconclass="wm-sl-l sl-user" iconsize="18px"></wm-icon>
                                <wm-icon name="icon_lock" iconclass="wi wi-lock" iconsize="14px"></wm-icon>
                                <wm-label name="lbl_phone_value"
                                    caption="bind:Variables.svGetEmployeeById.dataSet.phone" variant="label-bold"
                                    class="label-bold"></wm-label>
                            </wm-container>
                            <!-- Row: Address -->
                            <wm-container name="row_address" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_address_field" caption="Address" class="text-right label-14-400"
                                    width="140px" variant="label-14-400"></wm-label>
                                <wm-icon name="icon_address_person" iconclass="wm-sl-l sl-user" iconsize="18px">
                                </wm-icon>
                                <wm-label name="lbl_address_value"
                                    caption="bind:Variables.svGetEmployeeById.dataSet.address.address"
                                    variant="label-bold" class="label-bold"></wm-label>
                            </wm-container>
                            <!-- Divider -->
                            <wm-container name="divider3" class="app-container-default" direction="row" gap="0"
                                alignment="top-left" width="fill" height="1px" backgroundcolor="#cccccc"></wm-container>
                            <!-- Row: Last Sign In -->
                            <wm-container name="row_lastsignin" class="app-container-default" direction="row" gap="8"
                                alignment="top-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_lastsignin_field" caption="Last Sign In"
                                    class="text-right label-14-400" width="140px" variant="label-14-400"></wm-label>
                                <wm-container name="lastsignin_value_col" class="app-container-default"
                                    direction="column" gap="2" alignment="top-left" width="fill" height="hug">
                                    <wm-label name="lbl_lastsignin_value"
                                        caption="bind:Variables.svGetEmployeeById.dataSet.lastLogon"
                                        variant="label-bold" class="label-bold"></wm-label>
                                    <wm-anchor name="anc_email_signin" caption="Email Sign In" iconclass="wi wi-email"
                                        iconposition="left"></wm-anchor>
                                </wm-container>
                            </wm-container>
                            <!-- Divider -->
                            <wm-container name="divider4" class="app-container-default" direction="row" gap="0"
                                alignment="top-left" width="fill" height="1px" backgroundcolor="#cccccc"></wm-container>
                            <!-- Row: Custom Field 1 -->
                            <wm-container name="row_customfield1" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_customfield1_field" caption="*Custom Field 1"
                                    class="text-right label-14-400" width="140px" variant="label-14-400"></wm-label>
                                <wm-label name="lbl_customfield1_value"
                                    caption="bind:Variables.svGetEmployeeById.dataSet.customField1" variant="label-bold"
                                    class="label-bold"></wm-label>
                            </wm-container>
                            <!-- Row: Default Pay Rate -->
                            <wm-container name="row_payrate" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_payrate_field" caption="Default Pay Rate"
                                    class="text-right label-14-400" width="140px" variant="label-14-400"></wm-label>
                                <wm-label name="lbl_payrate_value"
                                    caption="bind:Variables.svGetEmployeeById.dataSet.payRate" variant="label-bold"
                                    class="label-bold"></wm-label>
                            </wm-container>
                            <!-- Row: Next Alert Date -->
                            <wm-container name="row_alertdate" class="app-container-default" direction="row" gap="8"
                                alignment="middle-left" width="fill" height="hug" padding="8px 0px">
                                <wm-label name="lbl_alertdate_field" caption="Next Alert Date"
                                    class="text-right label-14-400" width="140px" variant="label-14-400"></wm-label>
                                <wm-label name="lbl_alertdate_value"
                                    caption="bind:Variables.svGetEmployeeById.dataSet.nextAlertDate"
                                    variant="highlighted-danger-label-14-400"
                                    class="label-highlighted-danger-label-14-400"></wm-label>
                            </wm-container>
                        </wm-container>
                        <!-- Positions Section -->
                        <wm-container name="positions_section"
                            class="grey-no-radius-small-container container-grey-no-radius-small-container"
                            direction="column" gap="8" alignment="top-left" width="fill" height="hug" padding="16px">
                            <!-- Positions Header -->
                            <wm-container name="positions_header_row" class="app-container-default" direction="row"
                                gap="8" alignment="middle-left" width="fill" height="hug">
                                <wm-label name="lbl_positions_heading" caption="Positions" variant="label-18-700"
                                    class="label-18-700"></wm-label>
                                <wm-icon name="icon_positions_person" iconclass="wm-sl-l sl-user" iconsize="20px">
                                </wm-icon>
                            </wm-container>
                            <!-- Positions List -->
                            <wm-list name="positions_list" dataset="bind:Variables.svGetEmployeeById.dataSet.positions"
                                class="list-card" direction="column" gap="0" alignment="top-left" width="fill"
                                height="hug" listclass="list-group" wrap="true">
                                <wm-listtemplate name="positions_listtemplate" direction="row" gap="0"
                                    alignment="top-left" width="50%" height="hug">
                                    <wm-label name="lbl_position_item" caption="bind:item.description"
                                        variant="label-14-400" class="label-14-400"></wm-label>
                                </wm-listtemplate>
                            </wm-list>
                        </wm-container>
                    </wm-tabpane>
                    <!-- TAB 2: Schedules - Prefs -->
                    <wm-tabpane name="tab_schedules" title="Schedules - Prefs">
                        <wm-container name="schedules_placeholder" class="app-container-default" direction="column"
                            gap="8" alignment="top-left" width="fill" height="hug" padding="16px">
                            <wm-label name="lbl_schedules_placeholder" caption="Schedules - Prefs content coming soon"
                                variant="label-14-400"></wm-label>
                        </wm-container>
                    </wm-tabpane>
                    <!-- TAB 3: Time Off -->
                    <wm-tabpane name="tab_timeoff" title="Time Off">
                        <wm-container name="timeoff_placeholder" class="app-container-default" direction="column"
                            gap="8" alignment="top-left" width="fill" height="hug" padding="16px">
                            <wm-label name="lbl_timeoff_placeholder" caption="Time Off content coming soon"
                                variant="label-14-400"></wm-label>
                        </wm-container>
                    </wm-tabpane>
                    <!-- TAB 4: History -->
                    <wm-tabpane name="tab_history" title="History">
                        <wm-container name="history_placeholder" class="app-container-default" direction="column"
                            gap="8" alignment="top-left" width="fill" height="hug" padding="16px">
                            <wm-label name="lbl_history_placeholder" caption="History content coming soon"
                                variant="label-14-400"></wm-label>
                        </wm-container>
                    </wm-tabpane>
                </wm-tabs>
            </wm-container>
        </wm-page-content>
    </wm-content>
    <wm-footer content="footer" name="footer1"></wm-footer>
</wm-page>
