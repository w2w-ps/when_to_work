<wm-page name="page" pagetitle="Calender View">
    <wm-top-nav content="topnav" name="top_nav1"></wm-top-nav>
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent" class="p-0">
            <wm-container direction="column" alignment="top-left" width="fill" name="container1"
                class="app-container-default p-0" variant="default" height="fill" clipcontent="false" overflow="none"
                wrap="false">
                <wm-container direction="row" alignment="middle-center" width="fill" name="container2"
                    class="app-container-default" variant="default" height="hug" clipcontent="false" overflow="none"
                    content="scheduleTopNav"></wm-container>
                <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container4"
                    class="app-container-default" variant="default">
                    <wm-prefab prefabname="Weekview" name="Weekview1"
                        on-daterangechange="Weekview1Daterangechange($event, $data)" width="100%"></wm-prefab>
                </wm-container>
                <wm-container direction="row" alignment="middle-left" gap="4" width="fill" name="container14"
                    class="app-container-default" variant="default" padding="unset 24px">
                    <wm-anchor margin="unset 0.5em" name="anchor2" variant="standard-sm"
                        caption="Change Layout &amp; Start Date" on-click="anchor2Click($event, widget)"
                        iconclass="wm-sl-r sl-layout-two-columns" class="anchor-standard-sm"></wm-anchor>
                </wm-container>
                <wm-container direction="column" alignment="top-left" gap="10" width="fill" height="hug"
                    name="monthView" class="app-container-default" variant="default" clipcontent="false" overflow="none"
                    wrap="false" padding="unset 12px">
                    <!-- Day-of-week header row -->
                    <wm-container direction="row" alignment="top-left" gap="0" width="fill" height="hug"
                        name="monthHeaderRow" class="app-container-default" variant="default" clipcontent="false"
                        overflow="none" wrap="false">
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrSun" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Sunday" name="lblHdrSun" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrMon" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Monday" name="lblHdrMon" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrTue" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Tuesday" name="lblHdrTue" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrWed" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Wednesday" name="lblHdrWed" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrThu" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Thursday" name="lblHdrThu" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrFri" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Friday" name="lblHdrFri" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrSat" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Saturday" name="lblHdrSat" class="label-label-12-700"
                                variant="label-12-700"></wm-label>
                        </wm-container>
                    </wm-container>
                    <!-- Weeks list: each item is a week row with 7 day slots -->
                    <wm-list name="daySlotsList" dataset="bind:calendarDaySlots"
                        class="cal-day-slots-list list-card pl-2" listclass="cal-day-slots-listgroup" direction="row"
                        gap="0" alignment="top-left" width="fill" height="hug" wrap="true"
                        itemclass="bind:item.hasDate ? (item.positions &amp;&amp; item.positions.length &gt; 0 ? 'cal-day-slot-item cal-cell-current-month' : 'cal-day-slot-item cal-cell-current-month cal-cell-empty') : 'cal-day-slot-item cal-cell-other-month'"
                        variant="standard">
                        <wm-listtemplate name="daySlotTemplate" direction="column" gap="0" alignment="middle-center"
                            width="fill" height="hug">
                            <wm-container direction="row" alignment="middle-center" gap="4" width="fill"
                                name="container16" class="container-grey-no-radius-small-container"
                                variant="grey-no-radius-small-container" height="hug" clipcontent="false"
                                overflow="none">
                                <wm-label caption="bind:item.dayNum" name="lblDayNum" class="label-label-16-700"
                                    show="bind:item.hasDate" variant="label-16-700"></wm-label>
                            </wm-container>
                            <wm-list name="posListDay" dataset="bind:item.positions" listclass="list-group"
                                direction="column" gap="0" alignment="top-left" width="fill" height="hug"
                                show="bind:item.hasDate" variant="standard">
                                <wm-listtemplate name="posListDayTpl" direction="column" alignment="top-left"
                                    width="fill" height="hug">
                                    <wm-container direction="row" alignment="middle-center" gap="4" width="fill"
                                        height="18px" name="container13" class="container-purple-bg" variant="purple-bg"
                                        show="bind:item.showHeader" clipcontent="false" overflow="none">
                                        <wm-label caption="bind:item.positionName" name="lblPosName"
                                            class="label-label-13-700-darkviolet" variant="label-13-700-darkviolet">
                                        </wm-label>
                                    </wm-container>
                                    <wm-list name="timeGroupList" dataset="bind:item.timeGroups" listclass="list-group"
                                        direction="column" gap="0" alignment="top-left" width="fill" height="hug"
                                        clipcontent="false" overflow="none" class="cal-emp-list">
                                        <wm-listtemplate name="timeGroupListTpl" direction="column" gap="0"
                                            alignment="top-left" width="fill" height="hug">
                                            <wm-container name="timeGroupDivider" direction="row" gap="0"
                                                alignment="top-left" width="fill" height="hug"
                                                class="time-group-divider" show="bind:$index &gt; 0"></wm-container>
                                            <wm-label caption="bind:item.timeRange" name="lblEmpTimeRange"
                                                class="label-label-13-400-black pt-1" variant="label-13-400-black"
                                                show="bind:item.timeRange != ''"></wm-label>
                                            <wm-list name="empListDay" dataset="bind:item.employees"
                                                class="cal-emp-list" listclass="list-group" direction="column" gap="0"
                                                alignment="top-left" width="fill" height="hug">
                                                <wm-listtemplate name="empListDayTpl" direction="column" gap="0"
                                                    alignment="top-left" width="fill" height="hug">
                                                    <wm-container direction="row" gap="4" alignment="middle-left"
                                                        width="fill" height="hug" name="empRowContainer"
                                                        class="app-container-default" padding="unset 3px">
                                                        <wm-icon name="iconEmpDay" iconclass="fa fa-diamond"
                                                            variant="purple" class="orange"></wm-icon>
                                                        <wm-anchor caption="bind:item.employeeName" name="anchorEmpDay"
                                                            variant="standard-13-700" class="anchor-standard-13-700">
                                                        </wm-anchor>
                                                        <wm-label caption="bind:item.categoryName"
                                                            name="lblCategoryName" class="label-label-12-400"
                                                            variant="label-12-400" show="bind:item.categoryName != ''">
                                                        </wm-label>
                                                    </wm-container>
                                                    <wm-label padding="unset" caption="bind:item.description"
                                                        class="p text-primary" type="p" name="description"
                                                        variant="text:primary"
                                                        show="bind:App.Variables.appSelectedGrouping.dataSet.showDescription">
                                                    </wm-label>
                                                </wm-listtemplate>
                                            </wm-list>
                                        </wm-listtemplate>
                                    </wm-list>
                                </wm-listtemplate>
                            </wm-list>
                        </wm-listtemplate>
                    </wm-list>
                </wm-container>
                <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container18"
                    class="app-container-default" variant="default">
                    <wm-prefab prefabname="Weekview" name="Weekview2" width="100%"></wm-prefab>
                </wm-container>
                <wm-container direction="column" alignment="top-left" gap="10" width="fill" name="container19"
                    class="container-grey-standard mx-3" variant="grey-standard" wrap="false">
                    <wm-container direction="row" alignment="center" gap="auto" width="fill" name="container30"
                        class="app-container-default" variant="default">
                        <wm-label padding="unset" caption="Information" class="label-label-20-700" type="p"
                            name="label15" variant="label-20-700"></wm-label>
                        <wm-container direction="row" alignment="middle-center" gap="0" width="hug" name="container31"
                            variant="default">
                            <wm-anchor margin="unset 0.5em" variant="standard" caption="Help on this topic" class="more"
                                name="anchor9"></wm-anchor>
                        </wm-container>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container29"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption=" Week is Published" class="label-label-14-400 red-underlined"
                            type="p" name="label19" variant="label-14-400"></wm-label>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container27"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption="Week is Unpublished" class="label-label-14-400 black-boxed"
                            type="p" variant="label-14-400" name="label20"></wm-label>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container28"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption="Week is Partially Published"
                            class="label-label-14-400 violet-box" type="p" variant="label-14-400" name="label21">
                        </wm-label>
                    </wm-container>
                    <wm-container class="container-grey-container-white-border mt-2" direction="row" gap="4"
                        alignment="middle-left" width="fill" height="hug" variant="grey-container-white-border"
                        name="container32">
                        <wm-icon iconclass="fa fa-wrench" iconsize="sm" class="icon-icon-14" variant="icon-14"
                            name="icon5_1"></wm-icon>
                        <wm-label caption="Status" class="label-label-14-700 ps-2" variant="label-14-700"
                            name="label24"></wm-label>
                        <wm-icon iconclass="fa fa-diamond" iconsize="sm" class="purple ps-3 fa-xs" name="icon6"
                            variant="default:xs"></wm-icon>
                        <wm-label caption="Full Time" variant="default" name="label25"></wm-label>
                        <wm-icon iconclass="fa fa-diamond" iconsize="sm" class="blue ps-3 fa-xs" name="icon7"
                            variant="default:xs"></wm-icon>
                        <wm-label caption="Part Time" variant="default" name="label26"></wm-label>
                        <wm-icon iconclass="fa fa-diamond" iconsize="sm" class="orange ps-3 fa-xs" name="icon8"
                            variant="default:xs"></wm-icon>
                        <wm-label caption="Per Diem" variant="default" name="label27"></wm-label>
                    </wm-container>
                </wm-container>
                <wm-container class="app-container-default footerInfoSection" direction="row" gap="auto"
                    alignment="center" width="fill" height="hug" padding="60px unset unset unset" name="container51"
                    variant="default">
                    <wm-label caption="Questions, comments or suggestions? Contact W2W"
                        class="lblContactW2W label-label-13-700-black"
                        on-click="Widgets.confirmShiftChangeDialog.open()" variant="label-13-700-black" name="label47">
                    </wm-label>
                    <wm-button iconclass="fa fa-question" class="btn-filled-primary-circle"
                        variant="filled-primary-circle" name="button1"></wm-button>
                </wm-container>
            </wm-container>
        </wm-page-content>
    </wm-content>
</wm-page>
