<wm-page name="page" pagetitle="Calender View">
    <wm-top-nav content="topnav" name="top_nav1"></wm-top-nav>
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent">
            <wm-container direction="column" alignment="top-left" gap="20" width="fill" name="container1"
                class="app-container-default" variant="default" height="fill" clipcontent="false" overflow="none"
                wrap="false">
                <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container34"
                    class="app-container-default" variant="default" content="scheduleTopNav"></wm-container>
                <wm-container direction="column" alignment="top-left" width="fill" name="container31_1"
                    variant="default" wrap="false" clipcontent="false" overflow="none">
                    <wm-container direction="row" alignment="middle-center" width="fill" name="container32"
                        class="container-grey-no-radius-small-container" variant="grey-no-radius-small-container"
                        content="monthlyView" padding="20px 10px"></wm-container>
                    <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container32_1"
                        class="container-grey-no-radius-small-container" variant="grey-no-radius-small-container"
                        height="hug" clipcontent="false" overflow="none">
                        <wm-tabs type="static" statehandler="URL" name="tabs1" variant="standard" defaultpaneindex="9">
                            <wm-tabpane title="Mon" name="tabpane1"></wm-tabpane>
                            <wm-tabpane title="Tue" name="tabpane2"></wm-tabpane>
                            <wm-tabpane title="Wed" name="tabpane3"></wm-tabpane>
                            <wm-tabpane title="Thur" name="tabpane4"></wm-tabpane>
                            <wm-tabpane title="Fri" name="tabpane5"></wm-tabpane>
                            <wm-tabpane title="Sat" name="tabpane6"></wm-tabpane>
                            <wm-tabpane title="Sun" name="tabpane7"></wm-tabpane>
                            <wm-tabpane title="Weekly" name="tabpane8"></wm-tabpane>
                            <wm-tabpane title="Monthly" name="tabpane9"></wm-tabpane>
                        </wm-tabs>
                    </wm-container>
                </wm-container>
                <wm-container direction="row" alignment="middle-left" gap="4" width="fill" name="container14"
                    class="app-container-default" variant="default">
                    <wm-anchor margin="unset 0.5em" name="anchor2" variant="standard"
                        caption="Change Layout &amp; Start Date" on-click="anchor2Click($event, widget)"></wm-anchor>
                </wm-container>
                <wm-container direction="column" alignment="top-left" gap="0" width="fill" name="container32_2"
                    class="app-container-default" variant="default" clipcontent="false" overflow="none" wrap="false"
                    height="hug">
                    <wm-container direction="column" alignment="top-left" gap="10" width="fill" height="hug"
                        name="monthView" class="app-container-default" variant="default" clipcontent="false"
                        overflow="none" wrap="false">
                        <!-- Day-of-week header row -->
                        <wm-container direction="row" alignment="top-left" gap="0" width="fill" height="hug"
                            name="monthHeaderRow" class="container-white-container-no-border-radius"
                            variant="white-container-no-border-radius" clipcontent="false" overflow="none" wrap="false">
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrSun" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Sunday" name="lblHdrSun" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrMon" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Monday" name="lblHdrMon" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrTue" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Tuesday" name="lblHdrTue" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrWed" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Wednesday" name="lblHdrWed" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrThu" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Thursday" name="lblHdrThu" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrFri" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Friday" name="lblHdrFri" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                            <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                                name="hdrSat" class="cal-header-cell app-container-default" variant="default"
                                clipcontent="false" overflow="none" wrap="false">
                                <wm-label caption="Saturday" name="lblHdrSat" class="label-label-12-700"
                                    variant="label-12-700"></wm-label>
                            </wm-container>
                        </wm-container>
                        <!-- Weeks list: each item is a week row with 7 day slots -->
                        <wm-list name="daySlotsList" dataset="bind:calendarDaySlots"
                            class="cal-day-slots-list list-card pl-2" listclass="cal-day-slots-listgroup "
                            direction="row" gap="0" alignment="top-left" width="fill" height="hug" wrap="true"
                            itemclass="bind:item.hasDate 
  ? (item.positions &amp;&amp; item.positions.length &gt; 0 
      ? 'cal-day-slot-item cal-cell-current-month justify-content-start list-bordered' 
      : 'cal-day-slot-item cal-cell-current-month cal-cell-empty justify-content-start list-bordered') 
  : 'cal-day-slot-item cal-cell-other-month justify-content-start list-bordered'" variant="standard">
                            <wm-listtemplate name="daySlotTemplate" direction="column" gap="0" alignment="middle-center"
                                width="fill" height="hug">
                                <wm-container direction="row" alignment="middle-center" gap="4" width="fill"
                                    name="container16" class="container-grey-no-radius-small-container "
                                    variant="grey-no-radius-small-container" height="23px" clipcontent="false"
                                    overflow="none">
                                    <wm-label caption="bind:item.dayNum" name="lblDayNum"
                                        class="label-label-16-700-Arial" show="bind:item.hasDate"
                                        variant="label-16-700-Arial"></wm-label>
                                </wm-container>
                                <wm-list name="posListDay" dataset="bind:item.positions" listclass="list-group"
                                    direction="column" gap="0" alignment="top-left" width="fill" height="hug"
                                    show="bind:item.hasDate" variant="standard">
                                    <wm-listtemplate name="posListDayTpl" direction="column" gap="10"
                                        alignment="top-left" width="fill" height="hug">
                                        <wm-container direction="row" alignment="middle-center" gap="4" width="fill"
                                            height="hug" name="container13" class="container-purple-bg"
                                            variant="purple-bg" show="bind:item.showHeader">
                                            <wm-label caption="bind:item.positionName" name="lblPosName"
                                                class=" label-label-14-700" variant="label-14-700"></wm-label>
                                        </wm-container>
                                        <wm-list name="timeGroupList" dataset="bind:item.timeGroups"
                                            listclass="list-group" direction="column" gap="0" alignment="top-left"
                                            width="fill" height="hug" clipcontent="false" overflow="none"
                                            class="cal-emp-list">
                                            <wm-listtemplate name="timeGroupListTpl" direction="column" gap="0"
                                                alignment="top-left" width="fill" height="hug">
                                                <wm-container name="timeGroupDivider" direction="row" gap="0"
                                                    alignment="top-left" width="fill" height="hug"
                                                    class="time-group-divider" show="bind:$index &gt; 0"></wm-container>
                                                <wm-label caption="bind:item.timeRange" name="lblEmpTimeRange"
                                                    class="label-label-12-400" variant="label-12-400"
                                                    show="bind:item.timeRange != ''"></wm-label>
                                                <wm-list name="empListDay" dataset="bind:item.employees"
                                                    class="cal-emp-list" listclass="list-group" direction="column"
                                                    gap="0" alignment="top-left" width="fill" height="hug">
                                                    <wm-listtemplate name="empListDayTpl" direction="column" gap="0"
                                                        alignment="top-left" width="fill" height="hug">
                                                        <wm-container direction="row" gap="4" alignment="middle-left"
                                                            width="fill" height="hug" name="empRowContainer"
                                                            class="app-container-default">
                                                            <wm-icon name="iconEmpDay" iconclass="fa fa-diamond"
                                                                variant="purple" class="orange"></wm-icon>
                                                            <wm-anchor caption="bind:item.employeeName"
                                                                name="anchorEmpDay" variant="standard-sm"
                                                                class="anchor-standard-sm"></wm-anchor>
                                                            <wm-label caption="bind:item.categoryName"
                                                                name="lblCategoryName" class="label-label-12-400"
                                                                variant="label-12-400"
                                                                show="bind:item.categoryName != ''"></wm-label>
                                                        </wm-container>
                                                        <wm-label padding="unset" caption="bind:item.description"
                                                            class="p text-primary" type="p" name="description"
                                                            variant="text:primary"
                                                            show="bind:App.Variables.appSelectedGrouping.dataSet.showDescription">
                                                        </wm-label>
                                                    </wm-listtemplate>
                                                </wm-list>
                                            </wm-listtemplate>
                                        </wm-list>
                                    </wm-listtemplate>
                                </wm-list>
                            </wm-listtemplate>
                        </wm-list>
                    </wm-container>
                </wm-container>
                <wm-container direction="row" alignment="middle-center" gap="0" width="fill" height="hug"
                    name="container32_3" class="container-grey-no-radius-small-container"
                    variant="grey-no-radius-small-container" content="monthlyView" padding="20px 10px"></wm-container>
                <wm-container direction="column" alignment="top-left" gap="10" width="fill" name="container19"
                    class="container-grey-standard" variant="grey-standard" wrap="false">
                    <wm-container direction="row" alignment="center" gap="auto" width="fill" name="container30"
                        class="app-container-default" variant="default">
                        <wm-label padding="unset" caption="Information" class="label-label-20-700" type="p"
                            name="label15" variant="label-20-700"></wm-label>
                        <wm-container direction="row" alignment="middle-center" gap="0" width="hug" name="container31"
                            variant="default">
                            <wm-anchor margin="unset 0.5em" name="anchor4" variant="standard"
                                caption="Help on this topic " iconclass="wi wi-arrow-right-circle" iconposition="right">
                            </wm-anchor>
                            <wm-anchor margin="unset 0.5em" name="anchor5" variant="standard" caption="More">
                            </wm-anchor>
                        </wm-container>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container29"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption=" Week is Published" class="label-label-14-400" type="p"
                            name="label19" variant="label-14-400"></wm-label>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container27"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption="Week is Unpublished" class="label-label-14-400" type="p"
                            variant="label-14-400" name="label20"></wm-label>
                    </wm-container>
                    <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container28"
                        class="app-container-default" variant="default" clipcontent="false" overflow="none">
                        <wm-label padding="unset" caption="-" class="p text-primary" type="p" name="label22"
                            variant="text:primary"></wm-label>
                        <wm-label padding="unset" caption="Week is Partially Published" class="label-label-14-400"
                            type="p" variant="label-14-400" name="label21"></wm-label>
                    </wm-container>
                    <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container25"
                        class="container-white-container-no-border-radius" variant="white-container-no-border-radius"
                        height="hug" clipcontent="false" overflow="none" padding="1px unset"></wm-container>
                    <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container20"
                        class="app-container-default" variant="default">
                        <wm-container direction="row" alignment="middle-center" gap="4" width="hug" name="container21"
                            class="app-container-default" variant="default" clipcontent="false" overflow="none">
                            <wm-anchor margin="unset 0.5em" name="anchor3" variant="standard"
                                iconclass="wi wi-build fa-rotate-90 fa-lg" caption=""></wm-anchor>
                            <wm-label padding="unset" caption="Status" class="label-label-14-700" type="p"
                                name="label15_1" variant="label-14-700"></wm-label>
                        </wm-container>
                        <wm-container direction="row" alignment="middle-center" gap="4" width="hug"
                            class="app-container-default" variant="default" clipcontent="false" overflow="none"
                            name="container22">
                            <wm-icon class="purple" variant="purple" iconclass="fa fa-diamond" name="icon3"></wm-icon>
                            <wm-label padding="unset" caption="Full Time" class="label-label-14-400" type="p"
                                variant="label-14-400" name="label16"></wm-label>
                        </wm-container>
                        <wm-container direction="row" alignment="middle-center" gap="4" width="hug"
                            class="app-container-default" variant="default" clipcontent="false" overflow="none"
                            name="container23">
                            <wm-icon class="icon-icon-14-user-edit" variant="icon-14-user-edit"
                                iconclass="fa fa-diamond" name="icon4"></wm-icon>
                            <wm-label padding="unset" caption="Part Time" class="label-label-14-400" type="p"
                                variant="label-14-400" name="label17"></wm-label>
                        </wm-container>
                        <wm-container direction="row" alignment="middle-center" gap="4" width="hug"
                            class="app-container-default" variant="default" clipcontent="false" overflow="none"
                            name="container24">
                            <wm-icon class="orange" variant="purple" iconclass="fa fa-diamond" name="icon5"></wm-icon>
                            <wm-label padding="unset" caption="Per Diem" class="label-label-14-400" type="p"
                                variant="label-14-400" name="label18"></wm-label>
                        </wm-container>
                    </wm-container>
                    <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container26"
                        class="container-white-container-no-border-radius" variant="white-container-no-border-radius"
                        height="hug" clipcontent="false" overflow="none" padding="1px unset"></wm-container>
                </wm-container>
            </wm-container>
        </wm-page-content>
    </wm-content>
    <wm-footer content="footer" name="footer1"></wm-footer>
</wm-page>
