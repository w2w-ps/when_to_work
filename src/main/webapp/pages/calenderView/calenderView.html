<wm-page name="page" pagetitle="Calender View">
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent">
            <wm-container direction="column" alignment="top-left" gap="20" width="fill" name="container1"
                class="app-container-default" variant="default" height="fill" clipcontent="false" overflow="none"
                wrap="false">
                <wm-container direction="row" alignment="middle-center" gap="4" width="fill" name="container2"
                    class="app-container-default" variant="default" height="hug" clipcontent="false" overflow="none">
                    <wm-label padding="unset" caption="Partial Content" class="p text-primary" type="p" name="label12"
                        variant="text:primary"></wm-label>
                    <wm-label padding="unset" caption="Partial Content" class="p text-primary" type="p" name="label1"
                        variant="text:primary"></wm-label>
                </wm-container>
                <wm-container direction="row" alignment="top-left" gap="4" width="fill" name="container4"
                    class="app-container-default" variant="default">
                    <wm-prefab prefabname="Weekview" name="Weekview1"
                        on-daterangechange="Weekview1Daterangechange($event, $data)"></wm-prefab>
                </wm-container>
                <wm-container direction="row" alignment="middle-left" gap="4" width="fill" name="container14"
                    class="app-container-default" variant="default">
                    <wm-anchor margin="unset 0.5em" name="anchor2" variant="standard"
                        caption="Change Layout &amp; Start Date"
                        on-click="Actions.goToPage_mgrschedulecfgmonth.invoke()"></wm-anchor>
                </wm-container>
                <wm-container direction="column" alignment="top-left" gap="0" width="fill" height="hug" name="monthView"
                    class="app-container-default" variant="default" clipcontent="false" overflow="none" wrap="false">
                    <!-- Day-of-week header row -->
                    <wm-container direction="row" alignment="top-left" gap="0" width="fill" height="hug"
                        name="monthHeaderRow" class="cal-header-row app-container-default" variant="default"
                        clipcontent="false" overflow="none" wrap="false">
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrSun" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Sunday" name="lblHdrSun" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrMon" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Monday" name="lblHdrMon" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrTue" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Tuesday" name="lblHdrTue" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrWed" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Wednesday" name="lblHdrWed" class="cal-header-label app-label">
                            </wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrThu" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Thursday" name="lblHdrThu" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrFri" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Friday" name="lblHdrFri" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                        <wm-container direction="column" alignment="middle-center" gap="0" width="fill" height="hug"
                            name="hdrSat" class="cal-header-cell app-container-default" variant="default"
                            clipcontent="false" overflow="none" wrap="false">
                            <wm-label caption="Saturday" name="lblHdrSat" class="cal-header-label app-label"></wm-label>
                        </wm-container>
                    </wm-container>
                    <!-- Weeks list: each item is a week row with 7 day slots -->
                    <wm-list name="daySlotsList" dataset="bind:calendarDaySlots"
                        class="cal-day-slots-list list-card pl-2" listclass="cal-day-slots-listgroup" direction="row"
                        gap="0" alignment="top-left" width="fill" height="hug" wrap="true" itemclass="cal-day-slot-item"
                        variant="standard">
                        <wm-listtemplate name="daySlotTemplate" direction="column" gap="0" alignment="middle-center"
                            width="fill" height="hug" class="daySlotTemplate">
                            <wm-label caption="bind:item.dayNum" name="lblDayNum"
                                class="cal-day-num label-label-16-700-Arial" show="bind:item.hasDate"
                                variant="label-16-700-Arial"></wm-label>
                            <wm-list name="posListDay" dataset="bind:item.positions" class="cal-pos-list"
                                listclass="list-group" direction="column" gap="0" alignment="top-left" width="fill"
                                height="hug" show="bind:item.hasDate">
                                <wm-listtemplate name="posListDayTpl" direction="column" gap="10" alignment="top-left"
                                    width="fill" height="hug" class="border">
                                    <wm-container direction="row" alignment="middle-center" gap="4" width="fill"
                                        name="container13" class="container-purple-bg" variant="purple-bg">
                                        <wm-label caption="bind:item.positionName" name="lblPosName"
                                            class=" label-label-14-700" variant="label-14-700"></wm-label>
                                    </wm-container>
                                    <wm-label caption="bind:item.timeRange" name="lblTimeRange"
                                        class="label-label-12-400" variant="label-12-400"></wm-label>
                                    <wm-list name="empListDay" dataset="bind:item.employees" class="cal-emp-list"
                                        listclass="list-group" direction="column" gap="0" alignment="top-left"
                                        width="fill" height="hug">
                                        <wm-listtemplate name="empListDayTpl" direction="row" gap="4"
                                            alignment="middle-left" width="fill" height="hug">
                                            <wm-icon name="iconEmpDay" iconclass="fa fa-diamond" variant="purple"
                                                class="orange"></wm-icon>
                                            <wm-anchor caption="bind:item.employeeName" name="anchorEmpDay"
                                                variant="standard"></wm-anchor>
                                            <wm-label padding="unset" caption="bind:item.description"
                                                class="p text-primary" type="p" name="description"
                                                variant="text:primary"
                                                show="bind:App.Variables.appSelectedGrouping.dataSet.showDescription">
                                            </wm-label>
                                        </wm-listtemplate>
                                    </wm-list>
                                </wm-listtemplate>
                            </wm-list>
                        </wm-listtemplate>
                    </wm-list>
                </wm-container>
            </wm-container>
        </wm-page-content>
    </wm-content>
</wm-page>
