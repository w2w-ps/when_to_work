<wm-page name="page" pagetitle="Mgremplist">
    <wm-content name="content">
        <wm-page-content columnwidth="12" name="pagecontent">
            <wm-container name="pageWrapper" class="app-container-default" direction="column" gap="0"
                alignment="top-left" width="fill" height="hug">
                <!-- PAGE TITLE -->
                <wm-container name="titleSection" class="app-container-default" direction="column" gap="4"
                    alignment="top-center" width="fill" height="hug">
                    <wm-label name="lblCompanyName" caption="Sample Company" class="label-label-20-700"
                        variant="label-20-700"></wm-label>
                    <wm-label name="lblPageTitle" caption="Employee List" class="label-label-20-700"
                        variant="label-20-700"></wm-label>
                </wm-container>
                <!-- TABS -->
                <wm-tabs name="employeeTabs" defaultpaneindex="0">
                    <wm-tabpane name="tabEmployees" title="Employees">
                        <!-- ACTION TOOLBAR -->
                        <wm-container name="actionToolbar" class="app-container-default" direction="row" gap="0"
                            alignment="middle-left" width="fill" height="hug">
                            <wm-button name="btnAddNewEmployee" caption="Add New Employee"
                                class="btn-filled-primary-variant" variant="filled-primary-variant"></wm-button>
                            <wm-button name="btnAddEditPositions" caption="Add/Edit Positions"
                                class="btn-filled-primary-variant" variant="filled-primary-variant"></wm-button>
                            <wm-button name="btnEmailSignIn" caption="Email Sign In Instructions"
                                class="btn-filled-primary-variant" variant="filled-primary-variant"></wm-button>
                            <wm-button name="btnPrint" caption="Print" class="btn-filled-primary-variant"
                                variant="filled-primary-variant"></wm-button>
                            <wm-button name="btnExport" caption="Export" class="btn-filled-primary-variant"
                                variant="filled-primary-variant"></wm-button>
                            <wm-button name="btnUpload" caption="Upload" class="btn-filled-primary-variant"
                                variant="filled-primary-variant"></wm-button>
                        </wm-container>
                        <!-- SECONDARY TOOLBAR -->
                        <wm-container name="secondaryToolbar" direction="row" gap="8" alignment="middle-left"
                            width="fill" height="hug" variant="default" class="app-container-default">
                            <wm-container name="selectColumnsGroup" class="app-container-default" direction="row"
                                gap="4" alignment="middle-left" width="hug" height="hug">
                                <wm-checkbox name="chkSelectColumns" type="checkbox"></wm-checkbox>
                                <wm-label name="lblSelectColumns" caption="Select Columns" class="label-label-small-400"
                                    variant="label-small-400"></wm-label>
                            </wm-container>
                            <wm-container direction="row" alignment="top-left" gap="4" width="fill"
                                name="containerAnchorsItems" class="container-grey-container" variant="grey-container">
                                <wm-label name="lblSelected" caption="Selected:" class="label-label-small-700"
                                    variant="label-small-700"></wm-label>
                                <wm-anchor margin="unset 0.5em" name="anchorSendReminder" variant="standard-sm"
                                    caption="SendReminder" iconclass="fa fa-list-alt" class="anchor-standard-sm">
                                </wm-anchor>
                                <wm-anchor margin="unset 0.5em" name="anchorMessage" variant="standard-sm"
                                    caption="Message" iconclass="wi wi-envelope" class="anchor-standard-sm"></wm-anchor>
                                <wm-anchor margin="unset 0.5em" name="anchorSendSignIn" variant="standard-sm"
                                    caption="Send Sign In" iconclass="fa fa-list-alt" class="anchor-standard-sm">
                                </wm-anchor>
                                <wm-anchor margin="unset 0.5em" name="anchorCopyClipboard" variant="standard-sm"
                                    caption="Copy to Clipboard" iconclass="wi wi-content-copy"
                                    class="anchor-standard-sm"></wm-anchor>
                                <wm-anchor margin="unset 0.5em" name="anchorBulkEdit" variant="standard-sm"
                                    caption="Bulk Edit" iconclass="wi wi-mode-edit" class="anchor-standard-sm">
                                </wm-anchor>
                                <wm-anchor margin="unset 0.5em" name="anchorBulkDelete" variant="standard-sm"
                                    caption="Bulk Delete" iconclass="fa fa-list-alt" class="anchor-standard-sm">
                                </wm-anchor>
                            </wm-container>
                        </wm-container>
                        <!-- FILTER ROW -->
                        <wm-container name="filterRow" class="app-container-default" direction="row" gap="4"
                            alignment="middle-right" width="fill" height="hug">
                            <wm-text name="txtFind" placeholder="Find" trailingiconclass="wi wi-clear"
                                class="form-control app-textbox" variant="standard"></wm-text>
                            <wm-select name="selStatus" dataset="All Status, Active, Inactive" placeholder="All Status">
                            </wm-select>
                            <wm-select name="selPositions" dataset="All Positions" placeholder="All Positions">
                            </wm-select>
                            <wm-label name="lblTotalEmployees" caption="Total Employees: 73" variant="default">
                            </wm-label>
                        </wm-container>
                        <!-- EMPLOYEE TABLE -->
                        <wm-table name="employeeTable" dataset="bind:Variables.employeeListModel.dataSet"
                            navigation="None" enablesort="true" showheader="true" spacing="condensed" multiselect="true"
                            rowactionsposition="first" radioselect="false">
                            <wm-table-column binding="View" caption="View" widget-type="button" edit-widget-type="text"
                                searchable="false" show="true" type="string" showineditmode="true" readonly="false">
                                <wm-button caption="" show="true" class="btn-sm btn-primary"
                                    iconclass="wm-sl-l sl-search" on-click="" conditionalclass="" conditionalstyle="">
                                </wm-button>
                            </wm-table-column>
                            <wm-table-column binding="Edit" caption="Edit" widget-type="button" edit-widget-type="text"
                                searchable="false" show="true" type="string" showineditmode="true" readonly="false">
                                <wm-button caption="" show="true" class="btn-sm btn-primary" iconclass="wi wi-mode-edit"
                                    on-click="" conditionalclass="" conditionalstyle=""></wm-button>
                            </wm-table-column>
                            <wm-table-column binding="status" caption="" widget-type="icon" width="40px"
                                edit-widget-type="text" show="true" type="string" sortable="false" showineditmode="true"
                                readonly="false">
                                <wm-icon caption="bind:row.getProperty('undefined')" iconclass="wi wi-star-border"
                                    iconposition="left" class="" conditionalclass="" conditionalstyle=""></wm-icon>
                            </wm-table-column>
                            <wm-table-column binding="firstName" caption="First" edit-widget-type="text" show="true"
                                type="string" showineditmode="true" readonly="false"></wm-table-column>
                            <wm-table-column binding="lastName" caption="Last" edit-widget-type="text" show="true"
                                type="string" showineditmode="true" readonly="false"></wm-table-column>
                            <wm-table-column binding="email" caption="Email*" edit-widget-type="text" show="true"
                                type="string" showineditmode="true" readonly="false"></wm-table-column>
                            <wm-table-column binding="empId" caption="ID #" edit-widget-type="text" show="true"
                                type="string" showineditmode="true" readonly="false"></wm-table-column>
                            <wm-table-column binding="lastSignIn" caption="Last Sign In" edit-widget-type="text"
                                show="true" type="string" showineditmode="true" readonly="false"></wm-table-column>
                        </wm-table>
                    </wm-tabpane>
                    <wm-tabpane name="tabPositions" title="Positions">
                        <wm-label name="lblPositionsContent" caption="Positions content coming soon." class="app-label">
                        </wm-label>
                    </wm-tabpane>
                    <wm-tabpane name="tabSmsStats" title="SMS Stats">
                        <wm-label name="lblSmsContent" caption="SMS Stats content coming soon." class="app-label">
                        </wm-label>
                    </wm-tabpane>
                    <wm-tabpane name="tabNotifications" title="Notifications">
                        <wm-label name="lblNotificationsContent" caption="Notifications content coming soon."
                            class="app-label"></wm-label>
                    </wm-tabpane>
                    <wm-tabpane name="tabPayRates" title="Pay Rates">
                        <wm-label name="lblPayRatesContent" caption="Pay Rates content coming soon." class="app-label">
                        </wm-label>
                    </wm-tabpane>
                    <wm-tabpane name="tabAlertDates" title="Alert Dates">
                        <wm-label name="lblAlertDatesContent" caption="Alert Dates content coming soon."
                            class="app-label"></wm-label>
                    </wm-tabpane>
                    <wm-tabpane name="tabDeleted" title="Deleted">
                        <wm-label name="lblDeletedContent" caption="Deleted content coming soon." class="app-label">
                        </wm-label>
                    </wm-tabpane>
                </wm-tabs>
                <!-- INFORMATION PANEL -->
                <wm-container name="infoPanel" class="container-grey-container" direction="column" gap="8"
                    alignment="top-left" width="fill" height="hug" variant="grey-container">
                    <wm-label name="lblInfoTitle" caption="Information" class="label-label-20-700"
                        variant="label-20-700"></wm-label>
                    <!-- Legend rows -->
                    <wm-container direction="row" alignment="top-right" gap="4" width="fill" name="container14"
                        class="app-container-default" variant="default">
                        <wm-anchor margin="unset 0.5em" name="anchor1" variant="standard-sm"
                            caption="Help on this topic -&gt; More" class="anchor-standard-sm"></wm-anchor>
                    </wm-container>
                    <wm-container name="legendRow1" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-label name="lblNoneBadge" caption="None:" class="app-label label-warning"></wm-label>
                        <wm-label name="lblNoneDesc" caption="No notifications selected for this email."
                            variant="default"></wm-label>
                    </wm-container>
                    <wm-container name="legendRow2" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-label name="lblInvalidBadge" caption="Invalid" class="app-label label-danger"></wm-label>
                        <wm-label name="lblInvalidDesc"
                            caption="The system adds &quot;Invalid&quot; when notifications to this email were returned as undeliverable so now notifications are no longer being sent to that address."
                            variant="default"></wm-label>
                    </wm-container>
                    <wm-container name="legendRow3" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-label name="lblUnsavedBadge" caption="" class="app-label label-warning"></wm-label>
                        <wm-label name="lblUnsavedDesc" caption="Changes not saved." class="app-label"></wm-label>
                    </wm-container>
                    <wm-container name="legendRow4" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-icon name="iconGoogle" iconclass="fa fa-google" iconsize="sm"></wm-icon>
                        <wm-label name="lblGoogleDesc" caption="Exporting to Google Calendar." variant="default">
                        </wm-label>
                    </wm-container>
                    <wm-container name="legendRow5" class="app-container-default" direction="row" gap="8"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-icon name="iconCalendar" iconclass="fa fa-calendar-times-o" iconsize="sm"></wm-icon>
                        <wm-label name="lblCalendarDesc" caption="Google Calendar Export NOT updating."
                            variant="default"></wm-label>
                    </wm-container>
                    <!-- Status Legend -->
                    <wm-container name="statusLegendRow" class="app-container-default" direction="row" gap="12"
                        alignment="middle-left" width="fill" height="hug">
                        <wm-icon name="iconStatusKey" iconclass="wi wi-settings" iconsize="sm"></wm-icon>
                        <wm-label name="lblStatusLabel" caption="Status" class="label-label-14-700"
                            variant="label-14-700"></wm-label>
                        <wm-icon name="iconFullTime" iconclass="fa fa-diamond" iconsize="sm"></wm-icon>
                        <wm-label name="lblFullTime" caption="Full Time" variant="default"></wm-label>
                        <wm-icon name="iconPartTime" iconclass="fa fa-diamond" iconsize="sm"></wm-icon>
                        <wm-label name="lblPartTime" caption="Part Time" variant="default"></wm-label>
                        <wm-icon name="iconPerDiem" iconclass="fa fa-diamond" iconsize="sm"></wm-icon>
                        <wm-label name="lblPerDiem" caption="Per Diem" variant="default"></wm-label>
                    </wm-container>
                    <!-- Instructional text -->
                    <wm-label name="lblInstruction1"
                        caption="- To delete Employee click the pencil icon next to their name and then click &quot;Delete&quot; (Employees cannot be bulk deleted.)"
                        variant="default"></wm-label>
                    <wm-label name="lblInstruction2"
                        caption="- To give an Employee manager-level access please go to Settings&gt;Add/Edit Managers page. Employee will then have two logins, one to access as manager and one as employee."
                        variant="default"></wm-label>
                    <wm-label name="lblInstruction3" caption="- Trouble with grid displaying?" variant="default">
                    </wm-label>
                </wm-container>
                <!-- FLOATING HELP BUTTON -->
                <wm-container direction="row" alignment="top-right" gap="4" width="fill" name="container16"
                    class="app-container-default" variant="default">
                    <wm-button name="btnHelp" caption="?" class="btn-filled btn-primary" iconclass=""
                        variant="filled:primary"></wm-button>
                </wm-container>
            </wm-container>
        </wm-page-content>
    </wm-content>
</wm-page>
